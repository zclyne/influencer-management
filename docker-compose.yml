services:
  frontend:
    image: oven/bun:1
    user: root
    working_dir: /app/frontend
    command: sh -c "bun install --frozen-lockfile && bun run dev"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    working_dir: /app/backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DATABASE_URL: sqlite:////app/.data/creatorflow.db
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_DIR: /app/.data/storage
      CORS_ORIGINS: http://localhost:5173
      UV_PROJECT_ENVIRONMENT: /tmp/creatorflow-backend-venv
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    working_dir: /app/backend
    command: uv run python -m app.tasks.worker
    environment:
      APP_ENV: local
      DATABASE_URL: sqlite:////app/.data/creatorflow.db
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_DIR: /app/.data/storage
      UV_PROJECT_ENVIRONMENT: /tmp/creatorflow-worker-venv
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  frontend_node_modules:
